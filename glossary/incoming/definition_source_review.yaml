- id: 171
  nombre: Ministerio
  id_norma: '1008692'
  articulo: 1º
  criterio: fecha
  confianza: baja
  needs_review: true
  fundamento: '[fundamento_inconsistente con la norma elegida] El artículo 1º de la
    Ley N° 18.989 (1988) define sustantivamente qué ES el Ministerio de Energía como
    ''órgano superior de colaboración del Presidente de la República'', estableciendo
    su naturaleza y función esencial. Aunque la Ley N° 21.090 (2018) es posterior,
    el concepto general de ''Ministerio'' en este contexto se refiere a la estructura
    creada por la ley de 1988, la cual no fue derogada en su esencia por la ley de
    2011 (que creó un ministerio diferente, Desarrollo Social y Familia, y derogó
    artículos específicos de la ley anterior, pero mantuvo la estructura base de los
    ministerios de energía/minería/economía). Por tanto, la norma de 1988 es la que
    mejor define el concepto histórico y funcional del Ministerio de Energía.'
  reasons:
  - label
