- id: 398
  nombre: Informe Técnico de Valorización de las instalaciones
  id_norma: '1146553'
  articulo: '5'
  criterio: sustancia
  confianza: baja
  needs_review: true
  fundamento: El artículo 5 es la definición sustantiva del concepto, estableciendo
    explícitamente qué es el 'Informe técnico de valorización de las instalaciones'
    y su relación con el artículo 112 de la Ley, mientras que los demás artículos
    se refieren a plazos, procedimientos de audiencia, discrepancias o aspectos específicos
    de la elaboración del informe.
  reasons:
  - remission
  - label
- id: 421
  nombre: Registro de Participación ciudadana
  id_norma: '1099982'
  articulo: 29 quinquies
  criterio: sustancia
  confianza: baja
  needs_review: true
  fundamento: El artículo 29 quinquies de la norma 1099982 (fecha 2017) es el único
    que define sustantivamente el concepto, estableciendo explícitamente que 'la Comisión
    deberá llevar un registro de participación ciudadana' para efectos de notificaciones
    y comunicaciones, mientras que los demás artículos o bien remiten a la Ley (art.
    90), describen procedimientos de inscripción (art. 118, 119), actualizaciones
    (art. 123) o requisitos de documentación (art. 119), sin definir la naturaleza
    del registro en sí mismo.
  reasons:
  - remission
  - label
