- id: 5
  nombre: MFAR
  id_norma: '1067875'
  articulo: SEGUNDO
  criterio: sustancia
  confianza: baja
  needs_review: true
  fundamento: El Artículo SEGUNDO es el único que define sustantivamente el concepto
    al establecer la fijación de precios para suministros de electricidad a clientes
    regulados, mientras que el Artículo PRIMERO se limita a fijar precios sin la misma
    precisión contextual respecto a la regulación de precios mencionada en el concepto,
    y ambos artículos pertenecen a la misma norma y fecha, por lo que la especialidad
    y jerarquía no discriminan entre ellos, siendo la sustancia el criterio decisorio.
  reasons:
  - label
- id: 8
  nombre: NSN
