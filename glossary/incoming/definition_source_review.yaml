  needs_review: true
  fundamento: '[fundamento_inconsistente con la norma elegida] El artículo 88 bis
    del Decreto con Fuerza de Ley N° 164 (Ley de Transporte Público) es el único candidato
    que define sustantivamente el concepto de MFAR (Mecanismo de Fomento al Transporte
    Público Remunerado) al establecer la competencia del Ministerio de Transportes
    y Telecomunicaciones para regular su confección, entrega, condiciones y procedimiento
