    la definición operativa del régimen al que se refiere el concepto NSN (Nudo Suministro
    Normalizado) en el contexto de la tarifa regulada, mientras que el Artículo Segundo
    solo detalla los precios específicos sin definir el concepto en sí.
  reasons:
  - label
