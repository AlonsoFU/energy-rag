- id: 117
  nombre: IFOR
  id_norma: '250604'
  articulo: '52'
  criterio: sustancia
  confianza: baja
  needs_review: true
  fundamento: '[fundamento_inconsistente con la norma elegida] El Artículo 52 del
    Decreto 70 de 2006 es la norma que mejor define el concepto ''IFOR'' (Indisponibilidad
    forzada) porque establece explícitamente la fórmula de cálculo basada en el tiempo
    de operación y el tiempo de indisponibilidad, proporcionando la definición sustantiva
    del término, a diferencia del Artículo 53 que solo menciona la determinación de
    la indisponibilidad sin definir el concepto en sí, y sin que la norma posterior
    (Decreto 1204 de 2024) contenga una definición más específica de este término
    particular.'
  reasons:
  - label
- id: 146
  nombre: Liquidador
  id_norma: '1058072'
  articulo: 2º
  criterio: sustancia
  confianza: baja
  needs_review: true
  fundamento: '[fundamento_inconsistente con la norma elegida] El Artículo 2º de la
    Ley 21.563 (D.O. 09.01.2014) es el único candidato que contiene una sección explícita
    de ''Definiciones'' donde se establecen los conceptos jurídicos clave para la
    aplicación de la ley. Aunque el texto proporcionado en el fragmento muestra la
    definición de ''Acuerdo de Reorganización Judicial'', este artículo es el mecanismo
    sustantivo designado por el legislador para definir términos como ''Liquidador''
    (y otros roles similares) dentro del marco legal, cumpliendo con el criterio de
    ''sustancia'' al explicar qué es el concepto, a diferencia de los otros artículos
    que tratan sobre remuneración, sanciones o procedimientos específicos.'
  reasons:
  - remission
